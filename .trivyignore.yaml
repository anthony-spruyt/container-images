---
# Path-specific trivy ignores
# https://trivy.dev/latest/docs/configuration/filtering

vulnerabilities:

secrets:

misconfigurations:
  # Test fixtures are minimal and don't need production-grade security
  - id: AVD-DS-0001
    paths:
      - test-images/**/Dockerfile
  - id: AVD-DS-0002
    paths:
      - test-images/**/Dockerfile
  - id: AVD-DS-0026
    paths:
      - test-images/**/Dockerfile
  # Go source includes internal Dockerfiles that don't need USER - not our code
  - id: AVD-DS-0002
    paths:
      - "**/go/src/**"
  # MegaLinter images run as root by design - they need to install packages and run linters
  - id: AVD-DS-0002
    paths:
      - megalinter-*/Dockerfile
  # Upstream source code checked out during CI - not our code
  - id: AVD-DS-0002
    paths:
      - "**/server/Dockerfile"
  # CronJob entrypoint — runs to completion, Job controller tracks success/failure
  - id: AVD-DS-0026
    paths:
      - ssh-key-rotation/Dockerfile
  # Job/CronJob entrypoint — Coder template sync + token rotation, runs to completion
  - id: AVD-DS-0026
    paths:
      - coder-gitops/Dockerfile
  # Base image intentionally stays root — downstream Dockerfiles set USER vscode
  - id: AVD-DS-0002
    paths:
      - devcontainer-common/Dockerfile
