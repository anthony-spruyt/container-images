app:
  log_level: INFO
  log_json: true
  scan_fail_fast: true
  scan_prompt_timeout: 30
  scan_output_timeout: 30
  lazy_load: true
input_scanners:
  - type: Regex
    params:
      patterns: ["Bearer [A-Za-z0-9-._~+/]+"]
      is_blocked: true
      match_type: search
      redact: true
output_scanners: []
